services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
    volumes:
      - /data/media/audiobooks:/audiobooks
      - /data/media/podcasts:/podcasts
      - /opt/containers/audiobookshelf/config:/config
      - /opt/containers/audiobookshelf/metadata:/metadata
    expose:
      - "80"

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - WEBUI_PORT=8080
      - TORRENTING_PORT=49494
      - UMASK=002
      - DOCKER_MODS=ghcr.io/gabe565/linuxserver-mod-vuetorrent
    volumes:
      - /opt/containers/qbittorrent/config:/config
      - /data/downloads/qbittorrent:/downloads
    expose:
      - "8080"
    ports:
      - "49494:49494"
      - "49494:49494/udp"

  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    environment:
      TZ: America/Chicago
    volumes:
      - /opt/containers/npm/data:/data
      - /opt/containers/npm/letsencrypt:/etc/letsencrypt

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - VERSION=docker
      - TZ=America/Chicago
    volumes:
      - /opt/containers/plex/config:/config
      - /data/media:/data/media
    restart: unless-stopped
