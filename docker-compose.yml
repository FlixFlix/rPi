services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
      - CONFIG_PATH=/config
      - METADATA_PATH=/metadata
    volumes:
      - /data/media/audiobooks:/audiobooks
      - /data/media/podcasts:/podcasts
      - /opt/containers/audiobookshelf/config:/config
      - /opt/containers/audiobookshelf/metadata:/metadata
    expose:
      - "80"

  library-manager:
    image: ghcr.io/deucebucket/library-manager:latest
    container_name: library-manager
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
    volumes:
      - /data/media/audiobooks:/audiobooks
      - /opt/containers/library-manager/config:/config
    expose:
      - "5000"

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - WEBUI_PORT=8080
      - TORRENTING_PORT=49494
      - UMASK=002
      - DOCKER_MODS=ghcr.io/vuetorrent/vuetorrent-lsio-mod:latest
    volumes:
      - /opt/containers/qbittorrent/config:/config
      - /data/media:/data/media
      - /data/downloads/qbittorrent:/downloads
    expose:
      - "8080"
    ports:
      - "49494:49494"
      - "49494:49494/udp"

  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    environment:
      TZ: America/Chicago
    volumes:
      - /opt/containers/npm/data:/data
      - /opt/containers/npm/letsencrypt:/etc/letsencrypt

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - VERSION=docker
      - TZ=America/Chicago
    volumes:
      - /opt/containers/plex/config:/config
      - /data/media:/data/media
    restart: unless-stopped

  mariadb:
    image: lscr.io/linuxserver/mariadb:latest
    container_name: mariadb
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - MYSQL_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MYSQL_DATABASE=jphardwoodflooring
      - MYSQL_USER=jph_user
      - MYSQL_PASSWORD=${MARIADB_JPH_PASSWORD}
    volumes:
      - /opt/containers/mariadb/data:/config
    expose:
      - "3306"

  wp_jph:
    image: wordpress:php8.2-apache
    container_name: wp_jph
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      - WORDPRESS_DB_HOST=mariadb:3306
      - WORDPRESS_DB_NAME=jphardwoodflooring
      - WORDPRESS_DB_USER=jph_user
      - WORDPRESS_DB_PASSWORD=${MARIADB_JPH_PASSWORD}
    volumes:
      - /home/pi/projects/sites/jphardwoodflooring.com/public:/var/www/html
    expose:
      - "80"

  wp_rocket:
    image: wordpress:php8.2-apache
    container_name: wp_rocket
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      - WORDPRESS_DB_HOST=mariadb:3306
      - WORDPRESS_DB_NAME=wp_rocket
      - WORDPRESS_DB_USER=wprocket_user
      - WORDPRESS_DB_PASSWORD=${MARIADB_WPROCKET_PASSWORD}
    volumes:
      - /home/pi/projects/sites/wp.rocket.int.yt/public:/var/www/html
    expose:
      - "80"

  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - /opt/containers/homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    network_mode: host
